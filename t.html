<style>*{margin:20px auto;filter: invert(1);image-rendering:pixelated}</style><canvas id=can style="display:block;height:300;width:400"></canvas><script>;const ctx=can.getContext("2d");const W=200;const H=150;can.width=W;can.height=H;const C=2000;const R=20;let pts=[];for(let i=0;i<C;i++){const b=Math.floor(Math.random()*8)*32; pts.push({x:Math.random()*W,y:Math.random()*H,vx:0,vy:0,b});};step=()=>{for(let i=0;i<pts.length;i++){const p=pts[i];let ax=0;let ay=0;for(let j=0;j<pts.length;j++){if(i===j)continue;const q=pts[j];if(q.b!==p.b)continue;let dx=q.x-p.x;let dy=q.y-p.y;if(dx>W/2)dx-=W;if(dx<-W/2)dx+=W;if(dy>H/2)dy-=H;if(dy<-H/2)dy+=H;const d2=dx*dx+dy*dy;if(d2>0&&d2<R*R){if(0<d2&&d2<2){ax-=dx;ay-=dy;}else{const inv=1/Math.sqrt(d2);ax+=dx*inv;ay+=dy*inv;}}}p.vx+=ax*(p.b/255)*0.1;p.vy+=ay*(p.b/255)*0.1;p.vx*=0.95;p.vy*=0.95;}for(const p of pts){p.x=(p.x+p.vx+W)%W;p.y=(p.y+p.vy+H)%H;};};draw=()=>{ctx.clearRect(0,0,W,H);for(const p of pts){const hue=(p.b/255)*360;ctx.fillStyle=`hsl(${hue},100%,50%)`;ctx.fillRect(p.x,p.y,1,1);};};loop=()=>{step();draw();setTimeout(()=>{requestAnimationFrame(loop);},100);};loop();</script>
