<style>*{margin:20px auto;filter: invert(1);image-rendering:pixelated}</style><canvas id=ca style="display:block;height:300;width:400"></canvas><script>let cx=ca.getContext("2d");let W=400;let H=300;ca.width=W;ca.height=H;let M = Math;let C=8000;let R=50;let N=M.PI;let pts=[];for(let i=0;i<C;i++){let b=M.floor(M.random()*4)*32; pts.push({x:M.random()*W,y:M.random()*H,vx:0,vy:0,b});};sp=()=>{for(let i=0;i<pts.length;i++){let p=pts[i];let ax=0;let ay=0;for(let j=0;j<pts.length;j++){if(i===j)continue;let q=pts[j];if(q.b!==p.b)continue;let dx=q.x-p.x;let dy=q.y-p.y;if(dx>W/2)dx-=W;if(dx<-W/2)dx+=W;if(dy>H/2)dy-=H;if(dy<-H/2)dy+=H;let d2=dx*dx+dy*dy;if(d2>0&&d2<R*R){if(0<d2&&d2<N){ax-=dx;ay-=dy;}else{let inv=1/M.sqrt(d2);ax+=dx*inv;ay+=dy*inv;}}}p.vx+=ax*(p.b/255)*0.1;p.vy+=ay*(p.b/255)*0.1;p.vx*=0.95;p.vy*=0.95;}for(let p of pts){p.x=(p.x+p.vx+W)%W;p.y=(p.y+p.vy+H)%H;};};dw=()=>{cx.clearRect(0,0,W,H);for(let p of pts){cx.fillStyle=`hsl(${(p.b/255)*360},100%,50%)`;cx.fillRect(p.x,p.y,1,1);};};lp=()=>{sp();dw();setTimeout(()=>{requestAnimationFrame(lp);},100);};lp();</script>
