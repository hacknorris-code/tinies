<style>*{background:#000;margin:20px auto;}#m{display:block}#pts{color:#0f0;max-width:fit-content;font-size:24px}</style><canvas id=m width=400 height=300></canvas><div id=pts>0</div><script>x=m.getContext("2d")
aUni="\u25B2",bUni="\u25CF", cUni="\u25C6"
const is=(x,y)=>x==y
v={show:!1,x:0,y:0}
x.font="64px sans"
rng=()=>v.y=Math.round(crypto.getRandomValues(new Uint32Array(1))[0] / 2 ** 32)
load=()=>{x.textAlign="center";
x.textBaseline="top";
x.clearRect(0,0,m.width,m.height)
x.fillStyle="#00f"
x.fillText(aUni,m.width/2,250)
x.fillStyle="#666"
x.fillText(cUni,m.width/2,m.height/2)
v.show&&(x.strokeStyle="#f00",x.lineWidth=2,x.beginPath(),x.moveTo(m.width/2,m.height+24),x.lineTo(m.width/2,m.height/2+24),x.lineTo(v.x*(m.width),m.height/2+24),x.stroke(),x.fillStyle="#ff0",x.fillText(bUni,v.y*m.width,m.height/2))}
hit=()=>{
pts.innerText++,v.show=!0,setTimeout(()=>{v.show=!1,load()},800)
a=new AudioContext,b=a.createOscillator()
b.connect(a.destination)
b.start()
setTimeout(()=>b.stop(),40)}
hK=(e)=>{switch(e.keyCode){case 37:case 65:v.x=0,is(v.x,v.y)&&hit(),rng()
break
case 39:case 68:v.x=1,is(v.x,v.y)&&hit(),rng()}
load()}
window.onkeydown=hK
rng()
load()
</script>
