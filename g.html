<!DOCTYPE html>
<meta name=viewport content="width=device-width,initial-scale=1.0">
<style>:root{color-scheme:light dark}a{color:blue}p,a{background:#8888;margin:0}.w{position:absolute;display:flex;flex-direction:column;width:50vw;height:50vh;resize:both;overflow:hidden}.bar{user-select:none}iframe{flex:1;border:0;width:100%;}</style>
<body style=background:#08f8;margin:0;height:100vh;display:flex;align-items:center;justify-content:center>
<p style=position:fixed;bottom:0;width:100%;padding:0 id=n></p></body>
<script>
document.body.onload=_=>{
c={sheets:"a.html",plot:"b.html",editor:"c.html",todo:"d.html",paint:"e.html",games:"s.html"}
n.innerHTML=Object.entries(c).map(([k,v])=>`<a href="${v}" onclick="oL(event,this)">${k}</a>`).join(" ");
}
oL=(e,a)=>{
e.preventDefault();
let w=document.createElement("p");
w.className="w";
w.style.left="10vw";
w.style.top="10vh";
w.innerHTML=`<p class=bar><span>${a.innerText}</span><button style=float:right>X</button></p><iframe allow="accelerometer;magnetometer;gyroscope;microphone;camera;clipboard" src="${a.href}"></iframe>`;
document.body.append(w);
w.querySelector("button").onclick=()=>w.remove();
drag(w);
}
function drag(w){
const b=w.querySelector(".bar")
let dx,dy,dg=false
b.onpointerdown=e=>{dg=true;dx=e.clientX-w.offsetLeft;dy=e.clientY-w.offsetTop;}
b.onpointermove=e=>{if(!dg) return;w.style.left=e.clientX-dx+"px";w.style.top=e.clientY-dy+"px"}
b.onpointerup=_=>{dg=false;}
}
</script>
