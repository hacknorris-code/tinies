<style>*{background:#000;margin:20px auto;}#m{display:block}#pts{color:#0f0;max-width:fit-content;font-size:24px}</style><canvas id=m width=400 height=300></canvas><div id=pts>0</div><script>x=m.getContext("2d")
aUni="\u25B2",bUni="\u25CF",x.font="64px sans",step=0,pA=0,M=Math;
tA=M.random()*M.PI*2;
x.textAlign="center";
x.textBaseline="middle";
addEventListener('load',()=>{
spin=()=>{
x.clearRect(0,0,m.width,m.height);
x.fillStyle="#fff"
x.fillText(bUni,m.width/2,m.height/2)
x.fillStyle="#888"
ox=m.width/2+100*M.cos(tA);
oy=m.height/2+100*M.sin(tA);
x.save();
x.translate(ox,oy);
x.rotate(tA-M.PI/2);
x.fillText(aUni,0,0);
x.restore();
x.fillStyle="#0f8"
pA=step*M.PI/180;
px=m.width/2+100*M.cos(pA);
py=m.height/2+100*M.sin(pA);
x.save();
x.translate(px,py);
x.rotate(pA-M.PI/2);
x.fillText(aUni,0,0);
x.restore();
step=(step+1)%360;
}
setInterval(spin,10);
});
shoot=()=>{
if(M.abs(tA-pA)<0.5){
pts.innerText++
tA=M.random()*M.PI*2
a=new AudioContext,b=a.createOscillator()
b.connect(a.destination)
b.start()
setTimeout(()=>b.stop(),80)}}
window.onclick=shoot
window.onkeydown=shoot
</script>
